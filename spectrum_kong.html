// [3] AUDIO ENGINE

let audioCtx = null;
let musicGain = null;
let musicOsc = null;
let musicPlaying = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.08;
  musicGain.connect(audioCtx.destination);
}

function playTone(freq, duration, type, vol, freqEnd) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, vol) {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 800;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

// Waveform per level — different "instrument" character
const LEVEL_WAVE = { 1: 'square', 2: 'triangle', 3: 'sawtooth', 4: 'sawtooth' };
const LEVEL_VOLUME = { 1: 0.04, 2: 0.045, 3: 0.05, 4: 0.06 };
const LEVEL_TEMPO = { 1: 0.95, 2: 0.9, 3: 0.85, 4: 1.0 };
let musicTimer = null;
function startMusic() {
  if (!audioCtx || musicPlaying) return;
  musicPlaying = true;
  const lvl = game.currentLevel || 1;
  const notes = LEVEL_MUSIC[lvl] || LEVEL_MUSIC[1];
  const wave = LEVEL_WAVE[lvl] || 'square';
  const vol = LEVEL_VOLUME[lvl] || 0.04;
  const tempo = LEVEL_TEMPO[lvl] || 0.95;
  let idx = 0;
  let nextNoteTime = audioCtx.currentTime;
  function scheduleNotes() {
    if (!musicPlaying) return;
    // Schedule notes ahead using AudioContext timing for gapless playback
    while (nextNoteTime < audioCtx.currentTime + 0.3) {
      const [freq, dur] = notes[idx % notes.length];
      const noteDur = dur * (1 / tempo);
      if (freq > 0) {
        const osc = audioCtx.createOscillator();
        osc.type = wave;
        osc.frequency.value = freq;
        const g = audioCtx.createGain();
        // Smooth envelope: quick attack, sustain, smooth release
        g.gain.setValueAtTime(0, nextNoteTime);
        g.gain.linearRampToValueAtTime(vol, nextNoteTime + 0.01);
        g.gain.setValueAtTime(vol, nextNoteTime + noteDur * 0.7);
        g.gain.linearRampToValueAtTime(0, nextNoteTime + noteDur * 0.98);
        osc.connect(g);
        g.connect(audioCtx.destination);
        osc.start(nextNoteTime);
        osc.stop(nextNoteTime + noteDur);
        // Boss level: add sub-bass layer
        if (lvl === 4) {
          const sub = audioCtx.createOscillator();
          sub.type = 'sine';
          sub.frequency.value = freq * 0.5;
          const sg = audioCtx.createGain();
          sg.gain.setValueAtTime(0, nextNoteTime);
          sg.gain.linearRampToValueAtTime(vol * 0.6, nextNoteTime + 0.01);
          sg.gain.linearRampToValueAtTime(0, nextNoteTime + noteDur * 0.9);
          sub.connect(sg);
          sg.connect(audioCtx.destination);
          sub.start(nextNoteTime);
          sub.stop(nextNoteTime + noteDur);
        }
      }
      nextNoteTime += noteDur;
      idx++;
    }
    musicTimer = setTimeout(scheduleNotes, 150);
  }
  scheduleNotes();
}
function stopMusic() { musicPlaying = false; clearTimeout(musicTimer); }

const keys = {};
let easterInput = '';

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  // Prevent browser defaults for all game keys during gameplay
  const gameKeys = ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyE','KeyX','KeyF'];
  if (gameKeys.includes(e.code)) e.preventDefault();
  if (game.state === 'TITLE' || game.state === 'LANGUAGE_SELECT') {
    easterInput += e.key.toUpperCase();
    if (easterInput.length > 10) easterInput = easterInput.slice(-10);
    if (easterInput.endsWith('WISPA')) { game.rainbowMode = true; addFloatingText(400, 300, 'RAINBOW MODE!', '#FF00FF', 120); }
    if (easterInput.endsWith('MIMOSA')) { game.invincibleTimer = 1800; addFloatingText(400, 300, 'INVINCIBLE 30s!', '#FFD700', 120); }
  }
  if (game.state === 'TITLE' && e.code === 'Space') { e.preventDefault(); game.state = 'INSTRUCTIONS'; }
  if (game.state === 'TITLE' && e.code === 'KeyH') { e.preventDefault(); game.state = 'INSTRUCTIONS'; }
  if (game.state === 'INSTRUCTIONS' && e.code === 'Space') { e.preventDefault(); startGame(); }
  if (game.state === 'LANGUAGE_SELECT' && e.code === 'Space') { e.preventDefault(); game.state = 'TITLE'; }
  if (game.state === 'GAME_OVER' && e.code === 'Space') { e.preventDefault(); checkHighScore(); }
  if (game.state === 'HIGH_SCORE_ENTRY') {
    e.preventDefault();
    if (e.code === 'Backspace' && game.initials.length > 0) game.initials = game.initials.slice(0, -1);
    else if (e.key.length === 1 && /[A-Za-z0-9]/.test(e.key) && game.initials.length < 3) game.initials += e.key.toUpperCase();
    else if (e.code === 'Enter' && game.initials.length > 0) saveHighScore();
  }
  if (game.state === 'LEVEL_CLEAR' && e.code === 'Space') { e.preventDefault(); nextLevel(); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function drawPlayer(x, y, frame, facing, state) {
  const f = facing === 'left' ? -1 : 1;
  ctx.save();
  if (f === -1) { ctx.translate(x + PLAYER_W, y); ctx.scale(-1, 1); x = 0; y = 0; }
  // Invincibility flash
  if (game.invincibleTimer > 0 && Math.floor(game.frameCount / 4) % 2) { ctx.globalAlpha = 0.5; }
  // Licensed shield glow
  if (player.hasLicensedSpectrum) {
    ctx.fillStyle = game.frameCount % 20 < 10 ? '#FFD70044' : '#FFD70022';
    ctx.fillRect((f===-1?0:x)-4, (f===-1?0:y)-4, PLAYER_W+8, PLAYER_H+8);
  }
  const px = f === -1 ? 0 : x;
  const py = f === -1 ? 0 : y;
  // Hard hat
  ctx.fillStyle = game.rainbowMode ? `hsl(${game.frameCount*3%360},100%,50%)` : '#FF6600';
  ctx.fillRect(px+4, py, 8, 4);
  // Head
  ctx.fillStyle = '#FFCC99';
  ctx.fillRect(px+4, py+4, 8, 6);
  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(px+6, py+6, 2, 2);
  ctx.fillRect(px+10, py+6, 2, 2);
  // Body
  ctx.fillStyle = '#0055AA';
  ctx.fillRect(px+2, py+10, 12, 8);
  // Tool belt
  ctx.fillStyle = '#886600';
  ctx.fillRect(px+2, py+14, 12, 2);
  // Belt buckle
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(px+7, py+14, 3, 2);
  // Legs
  ctx.fillStyle = '#003388';
  if (state === 'climb') {
    ctx.fillRect(px+2, py+18, 5, frame%2===0 ? 4 : 6);
    ctx.fillRect(px+9, py+18, 5, frame%2===0 ? 6 : 4);
  } else if (state === 'jump') {
    ctx.fillRect(px+1, py+18, 6, 4);
    ctx.fillRect(px+9, py+18, 6, 4);
  } else {
    ctx.fillRect(px+2, py+18, 5, frame%2===0 ? 6 : 4);
    ctx.fillRect(px+9, py+18, 5, frame%2===0 ? 4 : 6);
  }
  // Boots
  ctx.fillStyle = '#442200';
  ctx.fillRect(px+1, py+22, 6, 2);
  ctx.fillRect(px+9, py+22, 6, 2);
  // Installing animation
  if (state === 'install') {
    ctx.fillStyle = '#AAA';
    const wx = px + 14;
    const wy = py + 6;
    ctx.save();
    ctx.translate(wx+3, wy+3);
    ctx.rotate(game.frameCount * 0.2);
    ctx.fillRect(-3, -1, 6, 2);
    ctx.fillRect(-1, -3, 2, 6);
    ctx.restore();
  }
  ctx.restore();
}

function drawPlatform(x, y, w) {
  ctx.fillStyle = '#004400';
  ctx.fillRect(x, y, w, 8);
  ctx.fillStyle = game.rainbowMode ? `hsl(${(x+game.frameCount)%360},80%,40%)` : '#00AA00';
  ctx.fillRect(x, y, w, 3);
  ctx.fillStyle = '#006600';
  for (let i = x; i < x + w; i += 16) ctx.fillRect(i, y, 2, 8);
}

function drawLadder(x, y, h) {
  // Telecom tower structure (white and red segments)
  const segH = 10;
  const numSegs = Math.ceil(h / segH);
  for (let i = 0; i < numSegs; i++) {
    const sy = y + i * segH;
    const sh = Math.min(segH, y + h - sy);
    const isRed = i % 2 === 0;
    // Left and right tower legs
    ctx.fillStyle = isRed ? '#CC2222' : '#EEEEEE';
    ctx.fillRect(x, sy, 3, sh);
    ctx.fillRect(x + 9, sy, 3, sh);
    // Cross braces (X pattern)
    ctx.fillStyle = isRed ? '#FF4444' : '#FFFFFF';
    ctx.fillRect(x + 3, sy + sh / 2 - 1, 6, 2);
    // Diagonal braces
    if (sh >= 6) {
      for (let d = 0; d < sh - 1; d += 2) {
        const progress = d / sh;
        const lx = x + 3 + progress * 5;
        const rx = x + 8 - progress * 5;
        ctx.fillRect(Math.floor(lx), sy + d, 1, 2);
        ctx.fillRect(Math.floor(rx), sy + d, 1, 2);
      }
    }
  }
  // Blinking red light at top
  if (game.frameCount % 50 < 25) {
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(x + 4, y - 3, 4, 3);
  } else {
    ctx.fillStyle = '#660000';
    ctx.fillRect(x + 4, y - 3, 4, 3);
  }
}

function drawToken(x, y, type, frame) {
  const colors = { '2.4GHz': '#00FFFF', '5GHz': '#FFFF00', 'CBRS': '#FF00FF', 'LICENSED': frame % 20 < 10 ? '#FFD700' : '#FFFFFF' };
  ctx.fillStyle = colors[type] || '#00FFFF';
  const w = Math.abs(Math.cos(frame * 0.1)) * 10 + 4;
  ctx.fillRect(x + (14 - w) / 2, y, w, 14);
  ctx.fillStyle = '#000';
  ctx.font = 'bold 5px monospace';
  ctx.textAlign = 'center';
  if (w > 7) ctx.fillText(type.substring(0, 3), x + 7, y + 9);
}

function drawAntennaSpot(x, y, installed) {
  if (installed) {
    // Draw installed antenna
    ctx.fillStyle = '#00FF00';
    ctx.fillRect(x + 4, y - 20, 4, 20);
    ctx.fillRect(x - 2, y - 22, 16, 3);
    ctx.fillStyle = '#00CC00';
    ctx.fillRect(x + 2, y - 16, 2, 2);
    ctx.fillRect(x + 8, y - 16, 2, 2);
    // Blinking light
    if (game.frameCount % 40 < 20) { ctx.fillStyle = '#FF0000'; ctx.fillRect(x + 5, y - 24, 2, 2); }
  } else {
    // Blinking target
    const blink = game.frameCount % 30 < 15;
    ctx.fillStyle = blink ? '#FFAA00' : '#FF6600';
    ctx.strokeStyle = blink ? '#FFAA00' : '#FF6600';
    ctx.lineWidth = 1;
    ctx.strokeRect(x - 2, y - 12, 16, 12);
    ctx.fillStyle = '#FFAA0066';
    ctx.fillRect(x - 2, y - 12, 16, 12);
    ctx.fillStyle = '#FFF';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ANT', x + 6, y - 3);
  }
}

function drawBackhaulSpot(x, y) {
  // Satellite dish
  ctx.fillStyle = '#CCC';
  ctx.beginPath();
  ctx.arc(x + 8, y - 6, 10, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#999';
  ctx.fillRect(x + 6, y - 6, 4, 10);
  ctx.fillStyle = '#FFF';
  ctx.fillRect(x + 7, y - 8, 2, 4);
  // Blinking
  if (game.frameCount % 20 < 10) {
    ctx.fillStyle = '#00FF00';
    ctx.fillRect(x + 7, y - 14, 2, 2);
  }
}

function drawVillain(x, y, frame, isBoss) {
  const s = isBoss ? 2 : 1;
  ctx.save();
  if (isBoss) ctx.translate(x - 16, y - 16);
  else ctx.translate(x, y);
  // Body
  ctx.fillStyle = '#440066';
  ctx.fillRect(0, 8*s, 32*s, 20*s);
  // Head
  ctx.fillStyle = '#550088';
  ctx.fillRect(4*s, 0, 24*s, 12*s);
  // Eyes
  ctx.fillStyle = '#FF0000';
  ctx.fillRect(8*s, 4*s, 4*s, 4*s);
  ctx.fillRect(20*s, 4*s, 4*s, 4*s);
  // Tie
  ctx.fillStyle = '#FFFF00';
  ctx.fillRect(14*s, 12*s, 4*s, 10*s);
  // Briefcase
  ctx.fillStyle = '#886600';
  ctx.fillRect(24*s, 16*s, 8*s, 8*s);
  // Arm throwing animation
  if (frame % 90 < 30) {
    ctx.fillStyle = '#440066';
    ctx.fillRect(-4*s, 10*s, 8*s, 4*s);
  }
  ctx.restore();
}

function drawSpectrumGhost(x, y, frame) {
  // CRT monitor face
  ctx.fillStyle = '#333';
  ctx.fillRect(x, y, 20, 18);
  ctx.fillStyle = '#004400';
  ctx.fillRect(x + 2, y + 2, 16, 12);
  // Face
  const flicker = Math.sin(frame * 0.3) > 0;
  ctx.fillStyle = flicker ? '#00FF00' : '#008800';
  ctx.fillRect(x + 4, y + 5, 3, 3);
  ctx.fillRect(x + 12, y + 5, 3, 3);
  ctx.fillRect(x + 6, y + 9, 7, 2);
  // Legs
  ctx.fillStyle = '#222';
  ctx.fillRect(x + 4, y + 16, 3, 4);
  ctx.fillRect(x + 12, y + 16, 3, 4);
}

function drawStars() {
  ctx.fillStyle = '#FFF';
  for (let i = 0; i < 60; i++) {
    const sx = (i * 137 + 50) % W;
    const sy = (i * 97 + 20) % (GAME_BOT - GAME_TOP) + GAME_TOP;
    const twinkle = Math.sin(game.frameCount * 0.02 + i) > 0.5;
    if (twinkle) ctx.fillRect(sx, sy, 1, 1);
  }
}

function drawRuralBg() {
  ctx.fillStyle = '#0a0a20';
  ctx.fillRect(0, GAME_TOP, W, GAME_BOT - GAME_TOP);
  drawStars();
  // Water tower silhouette
  ctx.fillStyle = '#111133';
  ctx.fillRect(360, 80, 80, 480);
  ctx.fillRect(340, 60, 120, 30);
  // Hills
  ctx.fillStyle = '#0a1a0a';
  for (let i = 0; i < W; i += 2) {
    const h = Math.sin(i * 0.008) * 30 + 530;
    ctx.fillRect(i, h, 2, GAME_BOT - h);
  }
}

function drawFarmBg() {
  ctx.fillStyle = '#1a0a00';
  ctx.fillRect(0, GAME_TOP, W, GAME_BOT - GAME_TOP);
  // Sunset gradient
  for (let i = 0; i < 100; i++) {
    ctx.fillStyle = `rgb(${30+i/2},${10+i/5},${i/10})`;
    ctx.fillRect(0, GAME_TOP + i, W, 1);
  }
  // Grain elevator silhouette
  ctx.fillStyle = '#0a0500';
  ctx.fillRect(380, 60, 40, 500);
  ctx.fillRect(360, 50, 80, 20);
  // Fence
  ctx.fillStyle = '#221100';
  for (let i = 0; i < W; i += 40) {
    ctx.fillRect(i, 540, 3, 20);
    ctx.fillRect(i, 545, 40, 2);
  }
}

function drawCityBg() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, GAME_TOP, W, GAME_BOT - GAME_TOP);
  drawStars();
  // City skyline
  const buildings = [[50,350,60],[130,300,50],[200,380,40],[280,280,70],[370,320,50],[450,260,60],[540,340,50],[620,290,60],[710,360,40]];
  ctx.fillStyle = '#111';
  buildings.forEach(([bx, by, bw]) => {
    ctx.fillRect(bx, by, bw, GAME_BOT - by);
    // Windows
    ctx.fillStyle = '#332200';
    for (let wy = by + 10; wy < GAME_BOT - 20; wy += 20) {
      for (let wx = bx + 5; wx < bx + bw - 5; wx += 12) {
        if (Math.random() > 0.3 || game.frameCount % 200 < 100) ctx.fillRect(wx, wy, 6, 8);
      }
    }
    ctx.fillStyle = '#111';
  });
  // Blinking lights
  ctx.fillStyle = game.frameCount % 60 < 30 ? '#FF0000' : '#330000';
  buildings.forEach(([bx, by, bw]) => ctx.fillRect(bx + bw/2, by - 4, 4, 4));
}

function drawBossBg() {
  const intensity = Math.sin(game.frameCount * 0.05) * 20 + 20;
  ctx.fillStyle = `rgb(${intensity},0,${intensity*2})`;
  ctx.fillRect(0, GAME_TOP, W, GAME_BOT - GAME_TOP);
  // Static noise
  for (let i = 0; i < 200; i++) {
    const sx = Math.random() * W;
    const sy = Math.random() * (GAME_BOT - GAME_TOP) + GAME_TOP;
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.1})`;
    ctx.fillRect(sx, sy, 2, 1);
  }
}

function loadHighScores() {
  try { game.highScores = JSON.parse(localStorage.getItem('spectrumKongScores')) || []; }
  catch(e) { game.highScores = []; }
}

function saveHighScore() {
  game.highScores.push({ name: game.initials, score: player.score });
  game.highScores.sort((a, b) => b.score - a.score);
  game.highScores = game.highScores.slice(0, 5);
  localStorage.setItem('spectrumKongScores', JSON.stringify(game.highScores));
  game.state = 'TITLE';
}

function checkHighScore() {
  const lowest = game.highScores.length < 5 ? 0 : game.highScores[4].score;
  if (player.score > lowest || game.highScores.length < 5) {
    game.state = 'HIGH_SCORE_ENTRY';
    game.initials = '';
  } else {
    game.state = 'TITLE';
  }
}

function addFloatingText(x, y, text, color, duration) {
  game.floatingTexts.push({ x, y, text, color, life: duration || 60, maxLife: duration || 60 });
}

function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    game.particles.push({
      x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6 - 2,
      color, life: 30 + Math.random() * 20, size: 2 + Math.random() * 3,
    });
  }
}

// ============================================================
// [9] GAME LOGIC
// ============================================================
function resetPlayer() {
  player.x = 100; player.y = 530;
  player.vx = 0; player.vy = 0;
  player.onGround = false; player.onLadder = false;
  player.isJumping = false; player.isInstalling = false;
  player.frozen = false; player.frozenTimer = 0;
  player.installProgress = 0;
  player.dead = false; player.deadTimer = 0;
}

function startGame() {
  initAudio();
  player.lives = 3;
  player.score = 0;
  player.hasLicensedSpectrum = false;
  player.spectrumTokens = [];
  player.licensedCount = 0;
  player.cbrsCount = 0;
  player.regulatoryHits = 0;
  game.currentLevel = 1;
  game.rainbowMode = game.rainbowMode; // Keep if unlocked
  game.invincibleTimer = game.invincibleTimer; // Keep if active
  game.towerLoadShown = false;
  loadLevel(1);
  game.state = 'PLAYING';
  startMusic();
}

function loadLevel(num) {
  const lvl = LEVELS[num];
  if (!lvl) return;
  resetPlayer();
  game.barrels = [];
  game.tokens = [];
  game.particles = [];
  game.floatingTexts = [];
  game.barrelTimer = 0;
  game.lightningTimer = 0;
  game.lightningFlash = 0;
  game.bossLicenseCollected = 0;
  game.bossTokens = [];
  game.levelTimer = 0;

  // Deep copy antenna states
  game.antennaStates = (lvl.antennaSpots || []).map(a => ({ ...a, installed: false }));

  // Deep copy tokens
  game.tokens = (lvl.tokenPositions || []).map(t => ({ ...t, collected: false, frame: 0 }));

  // Moving platforms
  game.movingPlatforms = (lvl.movingPlatforms || []).map(p => ({ ...p, baseY: p.y }));

  // Ghosts
  game.ghosts = [];
  if (lvl.hasGhost) {
    game.ghosts.push({ x: 300, y: 440, vx: 1.5, frame: 0 });
  }

  // Projectiles & boss state
  game.projectiles = [];
  game.shootCooldown = 0;
  game.bossDefeated = false;
  game.bossHitFlash = 0;
  game.bossDefeatTimer = 0;

  // Boss tokens
  if (lvl.isBoss) {
    spawnBossToken();
    game.bossLicenseCollected = 0;
    player.hasLicensedSpectrum = false;
    game.bossHP = 8;
    game.bossMaxHP = 8;
  } else {
    game.bossHP = 0;
    game.bossMaxHP = 0;
  }

  // Site survey hidden spots
  game.siteSurveySpots = [];
  lvl.platforms.forEach(p => {
    if (Math.random() > 0.6) {
      game.siteSurveySpots.push({ x: p.x + p.w - 10, y: p.y, found: false });
    }
  });
  game.siteSurveyTimer = 0;
}

function spawnBossToken() {
  const lvl = LEVELS[4];
  const plats = lvl.platforms;
  const p = plats[1 + Math.floor(Math.random() * (plats.length - 1))];
  game.bossTokens.push({
    x: p.x + Math.random() * (p.w - 20) + 10,
    y: p.y - 20,
    type: 'LICENSED', collected: false, frame: 0,
  });
}

function spawnBarrel() {
  const lvl = LEVELS[game.currentLevel];
  if (!lvl) return;
  const types = lvl.barrelTypes;
  let type = types[Math.floor(Math.random() * types.length)];

  // Special barrels: Netflix (rare)
  if (Math.random() < 0.08) type = 'NETFLIX';
  // BEAD grant (rare)
  if (Math.random() < 0.05) type = 'BEAD';

  const vp = lvl.villainPos;
  const dir = Math.random() > 0.5 ? 1 : -1;
  const speedMult = 1 + (game.currentLevel - 1) * 0.15;

  let speed, barrel;
  const baseBarrel = {
    x: vp.x + 16, y: vp.y + 20, w: 16, h: 16,
    rotation: 0, dir, onPlatformIdx: -1,
  };

  switch (type) {
    case 'COMPETITOR':
      barrel = { ...baseBarrel, type, vx: 2.5 * dir * speedMult, vy: 0, speed: 2.5 * speedMult };
      break;
    case 'WEATHER':
      barrel = { ...baseBarrel, type, vx: (1.5 + Math.random() * 2) * dir * speedMult, vy: 0, speed: 2.5 * speedMult, canClimbLadder: true };
      break;
    case 'REGULATORY':
      barrel = { ...baseBarrel, type, vx: 1.0 * dir * speedMult, vy: 0, speed: 1.0 * speedMult };
      break;
    case 'NETFLIX':
      barrel = { ...baseBarrel, type, vx: 5 * dir * speedMult, vy: 0, speed: 5 * speedMult };
      break;
    case 'BEAD':
      barrel = { ...baseBarrel, type, vx: 1.5 * dir, vy: 0, speed: 1.5, angle: 0 };
      break;
    default:
      barrel = { ...baseBarrel, type: 'COMPETITOR', vx: 2.5 * dir * speedMult, vy: 0, speed: 2.5 * speedMult };
  }

  // Boss: spawn more barrels
  if (lvl.isBoss) {
    for (let i = 0; i < 3; i++) {
      const d = i === 0 ? -1 : (i === 1 ? 1 : (Math.random() > 0.5 ? 1 : -1));
      game.barrels.push({ ...barrel, dir: d, vx: barrel.speed * d, x: vp.x + 16 + (i-1)*20 });
    }
  } else {
    game.barrels.push(barrel);
  }
  playBarrelRoll();
}

function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function getLevelData() { return LEVELS[game.currentLevel]; }

function nextLevel() {
  game.currentLevel++;
  if (game.currentLevel > 4) {
    // Game complete!
    game.state = 'GAME_OVER';
    game.gameOverTimer = 0;
    stopMusic();
    return;
  }
  loadLevel(game.currentLevel);
  game.state = 'PLAYING';
  // Restart music with new level's melody
  stopMusic();
  startMusic();
}

function killPlayer() {
  if (game.invincibleTimer > 0) return;
  if (player.hasLicensedSpectrum && game.currentLevel === 4) {
    // Shield absorbs hit
    return;
  }
  player.dead = true;
  player.deadTimer = 90;
  playDeath();
  game.shakeTimer = 20;
  game.shakeIntensity = 5;
}

function respawnOrGameOver() {
  player.lives--;
  if (player.lives <= 0) {
    game.state = 'GAME_OVER';
    game.gameOverTimer = 0;
    stopMusic();
  } else {
    resetPlayer();
  }
}

// ============================================================
// [10] UPDATE
// ============================================================
function update() {
  game.frameCount++;
  game.levelTimer++;
  if (game.shakeTimer > 0) game.shakeTimer--;
  if (game.invincibleTimer > 0) game.invincibleTimer--;

  if (game.state !== 'PLAYING') return;

  const lvl = getLevelData();
  if (!lvl) return;

  // ---- Player dead animation ----
  if (player.dead) {
    player.deadTimer--;
    player.vy += GRAVITY;
    player.y += player.vy;
    if (player.deadTimer <= 0) respawnOrGameOver();
    return;
  }

  // ---- Frozen timer ----
  if (player.frozen) {
    player.frozenTimer--;
    if (player.frozenTimer <= 0) player.frozen = false;
    updateBarrels(lvl);
    updateParticles();
    updateFloatingTexts();
    return;
  }

  // ---- Player Movement ----
  player.vx = 0;
  const wasOnLadder = player.onLadder;

  // Check if on ladder
  player.onLadder = false;
  for (const lad of lvl.ladders) {
    const pcx = player.x + PLAYER_W / 2;
    if (pcx > lad.x - 2 && pcx < lad.x + 14 &&
        player.y + PLAYER_H > lad.y && player.y + PLAYER_H <= lad.y + lad.h + 10) {
      if (isUp() || isDown() || wasOnLadder) {
        player.onLadder = true;
        break;
      }
    }
  }

  if (player.onLadder) {
    player.vy = 0;
    if (isUp()) { player.y -= CLIMB_SPEED; player.animTimer++; }
    if (isDown()) { player.y += CLIMB_SPEED; player.animTimer++; }
    if (isLeft()) player.vx = -WALK_SPEED * 0.5;
    if (isRight()) player.vx = WALK_SPEED * 0.5;
    if (isJump() && !player.isJumping) {
      player.vy = JUMP_VEL;
      player.onLadder = false;
      player.isJumping = true;
      playJump();
    }
  } else {
    if (isLeft()) { player.vx = -WALK_SPEED; player.facing = 'left'; }
    if (isRight()) { player.vx = WALK_SPEED; player.facing = 'right'; }
    if (isJump() && player.onGround && !player.isJumping) {
      player.vy = JUMP_VEL;
      player.onGround = false;
      player.isJumping = true;
      playJump();
    }
    if (!isJump()) player.isJumping = false;
    player.vy += GRAVITY;
    if (player.vy > TERMINAL_VEL) player.vy = TERMINAL_VEL;
  }

  if (player.vx !== 0) { player.animTimer++; if (player.animTimer % 8 === 0) player.animFrame = 1 - player.animFrame; }

  player.x += player.vx;
  player.y += player.vy;

  // Clamp to screen
  if (player.x < 0) player.x = 0;
  if (player.x > W - PLAYER_W) player.x = W - PLAYER_W;
  if (player.y > GAME_BOT) { killPlayer(); return; }

  // ---- Platform collision ----
  player.onGround = false;
  const allPlatforms = [...lvl.platforms, ...game.movingPlatforms];
  for (const p of allPlatforms) {
    if (player.vy >= 0 &&
        player.x + PLAYER_W > p.x + 4 && player.x < p.x + p.w - 4 &&
        player.y + PLAYER_H >= p.y && player.y + PLAYER_H <= p.y + 12) {
      player.y = p.y - PLAYER_H;
      player.vy = 0;
      player.onGround = true;
      // Moving platform: carry player
      if (p.speed) player.y = p.y - PLAYER_H;
    }
  }

  // ---- Install mechanic ----
  player.isInstalling = false;
  if (isInstall() && player.onGround) {
    // Check antenna spots
    for (let i = 0; i < game.antennaStates.length; i++) {
      const a = game.antennaStates[i];
      if (!a.installed && Math.abs(player.x + PLAYER_W/2 - a.x - 6) < 20 && Math.abs(player.y + PLAYER_H - a.y) < 10) {
        player.isInstalling = true;
        player.installProgress += 1/180; // 3 seconds at 60fps
        if (player.installProgress >= 1) {
          a.installed = true;
          player.installProgress = 0;
          player.score += 1000;
          addFloatingText(a.x, a.y - 20, '+1000', '#00FF00', 60);
          addParticles(a.x + 6, a.y - 10, '#00FF00', 15);
          playInstall();
        }
        break;
      }
    }

    // Check backhaul — generous hitbox (30px range)
    const bh = lvl.backhaulSpot;
    if (bh && Math.abs(player.x + PLAYER_W/2 - bh.x - 8) < 30 && Math.abs(player.y + PLAYER_H - bh.y) < 30) {
      // Check if all antennas installed (or boss defeated)
      const allInstalled = game.antennaStates.every(a => a.installed);
      if (lvl.isBoss) {
        if (!game.bossDefeated) {
          // Boss not defeated yet — guide the player
          if (game.frameCount % 90 === 0) {
            if (!player.hasLicensedSpectrum) {
              addFloatingText(400, 300, S('boss_instruction'), '#FF4444', 80);
            } else {
              addFloatingText(400, 300, 'X = ' + S('instr_shoot'), '#FFAA00', 80);
            }
          }
        } else {
          // Boss defeated — install backhaul to win!
          player.isInstalling = true;
          player.installProgress += 1/180;
          if (player.installProgress >= 1) {
            player.installProgress = 0;
            game.timeBonus = Math.max(0, 300 - Math.floor(game.levelTimer / 60)) * 100;
            player.score += 2000 + game.timeBonus + 5000;
            game.state = 'LEVEL_CLEAR';
            game.levelClearTimer = 0;
            playLevelClear();
            stopMusic();
            addFloatingText(400, 200, S('network_up'), '#00FF00', 120);
            addFloatingText(400, 230, S('latency_msg'), '#FFD700', 120);
          }
        }
      } else if (allInstalled) {
        // Normal levels: all antennas installed, install backhaul
        player.isInstalling = true;
        player.installProgress += 1/180;
        if (player.installProgress >= 1) {
          player.installProgress = 0;
          game.timeBonus = Math.max(0, 300 - Math.floor(game.levelTimer / 60)) * 100;
          player.score += 2000 + game.timeBonus;
          game.state = 'LEVEL_CLEAR';
          game.levelClearTimer = 0;
          playLevelClear();
          stopMusic();
        }
      }
    }
  } else {
    player.installProgress = 0;
  }

  // ---- Shooting (X or F key) ----
  if (game.shootCooldown > 0) game.shootCooldown--;
  const canShoot = player.hasLicensedSpectrum || (getLevelData() && getLevelData().isBoss);
  if (isShoot() && canShoot && game.shootCooldown <= 0 && !player.isInstalling) {
    game.shootCooldown = 20; // Fire rate limit
    const dir = player.facing === 'right' ? 1 : -1;
    // Auto-aim toward boss if in boss level
    let pvx = 6 * dir;
    let pvy = -1.5;
    const lvlNow = LEVELS[game.currentLevel];
    if (lvlNow && lvlNow.isBoss && !game.bossDefeated && lvlNow.villainPos) {
      const bx = lvlNow.villainPos.x + 32;
      const by = lvlNow.villainPos.y + 24;
      const dx = bx - player.x;
      const dy = by - player.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 0) {
        pvx = (dx / dist) * 6;
        pvy = (dy / dist) * 6;
      }
    }
    game.projectiles.push({
      x: player.x + (dir === 1 ? PLAYER_W : 0),
      y: player.y + 8,
      vx: pvx,
      vy: pvy,
      life: 90,
      type: 'spectrum_beam',
    });
    playShoot();
  }

  // Update projectiles
  for (let i = game.projectiles.length - 1; i >= 0; i--) {
    const proj = game.projectiles[i];
    proj.x += proj.vx;
    proj.y += proj.vy;
    proj.life--;

    // Trail particles
    if (game.frameCount % 2 === 0) {
      addParticles(proj.x, proj.y, '#FFD700', 1);
    }

    // Hit boss — use distance-based collision (center to center)
    const isBossLevel = lvl.isBoss === true;
    if (isBossLevel && !game.bossDefeated && lvl.villainPos) {
      const bossCX = lvl.villainPos.x + 32;
      const bossCY = lvl.villainPos.y + 24;
      const dx = proj.x - bossCX;
      const dy = proj.y - bossCY;
      const distSq = dx * dx + dy * dy;
      const hitRadius = 80; // very generous hit radius
      if (distSq < hitRadius * hitRadius) {
        game.bossHP--;
        game.bossHitFlash = 15;
        game.shakeTimer = 8;
        game.shakeIntensity = 4;
        playBossHit();
        addFloatingText(bossCX, bossCY - 30, `-1 HP (${game.bossHP}/${game.bossMaxHP})`, '#FF4444', 45);
        addParticles(proj.x, proj.y, '#FF0000', 12);
        game.projectiles.splice(i, 1);

        if (game.bossHP <= 0) {
          game.bossDefeated = true;
          game.bossDefeatTimer = 180;
          playBossDefeat();
          addFloatingText(bossCX, bossCY - 50, 'K.O.!', '#FFD700', 120);
          addParticles(bossCX, bossCY, '#FF00FF', 30);
          addParticles(bossCX, bossCY, '#FFD700', 20);
          game.barrels = [];
        }
        continue;
      }
    }

    // Hit barrels (destroy them!)
    // In boss level: projectiles pass THROUGH barrels to reach the boss
    let projDestroyed = false;
    for (let j = game.barrels.length - 1; j >= 0; j--) {
      const b = game.barrels[j];
      if (proj.x > b.x && proj.x < b.x + 16 && proj.y > b.y && proj.y < b.y + 16) {
        addParticles(b.x + 8, b.y + 8, '#FF4444', 8);
        player.score += 75;
        addFloatingText(b.x, b.y - 10, '+75', '#FFD700', 30);
        game.barrels.splice(j, 1);
        if (!lvl.isBoss) {
          // Normal levels: projectile destroyed on barrel hit
          game.projectiles.splice(i, 1);
          projDestroyed = true;
          break;
        }
        // Boss level: projectile passes through, keeps going to hit boss
      }
    }
    if (projDestroyed) continue;

    if (proj.life <= 0 || proj.x < -10 || proj.x > W + 10 || proj.y < 0) {
      game.projectiles.splice(i, 1);
    }
  }

  // Boss defeat timer — after defeated, allow installing backhaul
  if (game.bossDefeated && game.bossDefeatTimer > 0) game.bossDefeatTimer--;

  // ---- Site survey (stand still at edge for 3 seconds) ----
  if (player.onGround && player.vx === 0 && !player.isInstalling) {
    game.siteSurveyTimer++;
    if (game.siteSurveyTimer >= 180) {
      for (const spot of game.siteSurveySpots) {
        if (!spot.found && Math.abs(player.x + PLAYER_W/2 - spot.x) < 20 && Math.abs(player.y + PLAYER_H - spot.y) < 10) {
          spot.found = true;
          player.score += 500;
          addFloatingText(spot.x, spot.y - 30, 'SITE SURVEY +500', '#00FFFF', 90);
          game.siteSurveyTimer = 0;
        }
      }
    }
  } else {
    game.siteSurveyTimer = 0;
  }

  // ---- Token collection ----
  const allTokens = [...game.tokens, ...game.bossTokens];
  for (const t of allTokens) {
    if (t.collected) continue;
    t.frame = game.frameCount;
    const dist = Math.hypot(player.x + PLAYER_W/2 - t.x - 7, player.y + PLAYER_H/2 - t.y - 7);
    if (dist < 24) {
      t.collected = true;
      playCollect();
      addParticles(t.x + 7, t.y + 7, t.type === 'LICENSED' ? '#FFD700' : '#00FFFF', 10);

      switch (t.type) {
        case '2.4GHz':
          player.score += 100;
          addFloatingText(t.x, t.y - 10, '+100', '#00FFFF', 45);
          // Speed boost for 5 seconds
          game.invincibleTimer = Math.max(game.invincibleTimer, 60);
          break;
        case '5GHz':
          player.score += 200;
          addFloatingText(t.x, t.y - 10, '+200', '#FFFF00', 45);
          break;
        case 'CBRS':
          player.score += 300;
          addFloatingText(t.x, t.y - 10, '+300', '#FF00FF', 45);
          player.cbrsCount++;
          // Destroy nearby competitor barrels
          game.barrels = game.barrels.filter(b => {
            if (b.type === 'COMPETITOR' && Math.hypot(b.x - t.x, b.y - t.y) < 120) {
              addParticles(b.x + 8, b.y + 8, '#FF4444', 12);
              player.score += 50;
              return false;
            }
            return true;
          });
          if (player.cbrsCount >= 5) {
            addFloatingText(400, 200, S('part96'), '#FF00FF', 120);
          }
          break;
        case 'LICENSED':
          player.score += 500;
          addFloatingText(t.x, t.y - 10, '+500', '#FFD700', 60);
          player.licensedCount++;
          if (lvl.isBoss) {
            game.bossLicenseCollected++;
            if (game.bossLicenseCollected >= 3) {
              player.hasLicensedSpectrum = true;
              playLicensedActivate();
              addFloatingText(400, 250, S('spectrum_licensed'), '#FFD700', 120);
            } else {
              addFloatingText(400, 300, `${game.bossLicenseCollected}/3`, '#FFD700', 60);
              // Spawn next token
              setTimeout(() => { if (game.state === 'PLAYING') spawnBossToken(); }, 2000);
            }
          } else {
            player.hasLicensedSpectrum = true;
            playLicensedActivate();
          }
          break;
      }

      // Extra life at 10000
      if (player.score >= 10000 && (player.score - 100) < 10000) {
        player.lives++;
        addFloatingText(400, 200, '1UP!', '#00FF00', 90);
      }

      // Easter egg: tower load at 5000
      if (player.score >= 5000 && !game.towerLoadShown) {
        game.towerLoadShown = true;
        addFloatingText(400, 150, S('tower_load'), '#FFFF00', 180);
      }
    }
  }

  // ---- Barrel spawning ----
  if (!game.bossDefeated) {
    game.barrelTimer++;
    if (game.barrelTimer >= lvl.barrelSpawnRate) {
      game.barrelTimer = 0;
      spawnBarrel();
    }
  }

  // ---- Villain animation ----
  game.villainFrame++;

  // ---- Update barrels ----
  updateBarrels(lvl);

  // ---- Weather pause/lightning ----
  if (lvl.barrelTypes.includes('WEATHER') || lvl.isBoss) {
    game.weatherPauseTimer++;
    if (game.weatherPauseTimer >= 480) { // 8 seconds
      game.weatherPauseTimer = 0;
      game.lightningFlash = 15;
      playThunder();
      game.shakeTimer = 10;
      game.shakeIntensity = 3;
      // Check if player near weather barrels
      for (const b of game.barrels) {
        if (b.type === 'WEATHER') {
          if (Math.hypot(player.x - b.x, player.y - b.y) < 60) {
            killPlayer();
            break;
          }
        }
      }
    }
  }

  // Boss lightning strikes
  if (lvl.isBoss && game.frameCount % 180 === 0) {
    game.lightningFlash = 10;
    playThunder();
    // Random lightning position
    const lx = Math.random() * (W - 40) + 20;
    addParticles(lx, 100, '#FFFF00', 8);
    if (Math.abs(player.x + PLAYER_W/2 - lx) < 30) {
      killPlayer();
    }
  }

  // ---- Moving platforms ----
  for (const mp of game.movingPlatforms) {
    mp.y += mp.speed * mp.dir;
    if (mp.y <= mp.minY) mp.dir = 1;
    if (mp.y >= mp.maxY) mp.dir = -1;
  }

  // ---- Ghosts ----
  for (const g of game.ghosts) {
    g.x += g.vx;
    g.frame++;
    if (g.x < 50 || g.x > W - 70) g.vx *= -1;
    // Collision
    if (aabb({ x: player.x + 2, y: player.y + 2, w: PLAYER_W - 4, h: PLAYER_H - 4 },
             { x: g.x, y: g.y, w: 20, h: 18 })) {
      killPlayer();
    }
  }

  // ---- Regulatory hit counter ----
  if (player.regulatoryHits >= 3) {
    addFloatingText(400, 250, S('license_suspended'), '#FF0000', 180);
    player.regulatoryHits = 0;
    player.frozen = true;
    player.frozenTimer = 180; // 3 seconds
  }

  // ---- Update effects ----
  updateParticles();
  updateFloatingTexts();
  if (game.lightningFlash > 0) game.lightningFlash--;
}

function updateBarrels(lvl) {
  const platforms = [...lvl.platforms, ...game.movingPlatforms];

  for (let i = game.barrels.length - 1; i >= 0; i--) {
    const b = game.barrels[i];

    // BEAD barrel moves in circles
    if (b.type === 'BEAD') {
      b.angle = (b.angle || 0) + 0.03;
      b.x += Math.cos(b.angle) * b.speed;
      b.y += Math.sin(b.angle) * b.speed;
      b.rotation += 0.05;
      if (b.y > GAME_BOT + 20 || b.x < -20 || b.x > W + 20) { game.barrels.splice(i, 1); continue; }
    } else {
      // Apply gravity
      b.vy = (b.vy || 0) + GRAVITY;
      if (b.vy > TERMINAL_VEL) b.vy = TERMINAL_VEL;
      b.x += b.vx;
      b.y += b.vy;
      b.rotation += b.vx * 0.05;

      // Platform collision for barrel
      for (const p of platforms) {
        if (b.vy >= 0 && b.x + 16 > p.x && b.x < p.x + p.w &&
            b.y + 16 >= p.y && b.y + 16 <= p.y + 12) {
          b.y = p.y - 16;
          b.vy = 0;
          // Weather barrels bounce
          if (b.type === 'WEATHER') b.vy = -(2 + Math.random() * 3);
        }
      }

      // Edge: reverse or fall
      let onAnyPlatform = false;
      for (const p of platforms) {
        if (b.y + 16 >= p.y - 2 && b.y + 16 <= p.y + 12 && b.x + 16 > p.x && b.x < p.x + p.w) {
          onAnyPlatform = true;
        }
      }

      // Weather barrels can climb ladders
      if (b.canClimbLadder && Math.random() < 0.01) {
        for (const lad of lvl.ladders) {
          if (Math.abs(b.x + 8 - lad.x - 6) < 16 && b.y + 16 > lad.y && b.y < lad.y + lad.h) {
            b.vy = -3;
            b.vx *= 0.5;
          }
        }
      }

      // Remove if off screen
      if (b.y > GAME_BOT + 20 || b.x < -40 || b.x > W + 40) { game.barrels.splice(i, 1); continue; }
    }

    // Collision with player
    const playerBox = { x: player.x + 2, y: player.y + 2, w: PLAYER_W - 4, h: PLAYER_H - 4 };
    const barrelBox = { x: b.x, y: b.y, w: 16, h: 16 };

    if (!player.dead && aabb(playerBox, barrelBox)) {
      if (game.invincibleTimer > 0) {
        // Destroy barrel
        addParticles(b.x + 8, b.y + 8, '#FFD700', 10);
        game.barrels.splice(i, 1);
        player.score += 50;
        continue;
      }
      if (player.hasLicensedSpectrum && b.type === 'WEATHER') {
        // Shield deflects weather
        addParticles(b.x + 8, b.y + 8, '#FFD700', 10);
        game.barrels.splice(i, 1);
        player.score += 150;
        addFloatingText(b.x, b.y - 10, '+150', '#FFD700', 45);
        if (game.currentLevel !== 4) player.hasLicensedSpectrum = false; // Single use outside boss
        continue;
      }
      if (b.type === 'REGULATORY') {
        player.frozen = true;
        player.frozenTimer = 120; // 2 seconds
        player.regulatoryHits++;
        game.barrels.splice(i, 1);
        addFloatingText(player.x, player.y - 20, S('barrel_regulatory'), '#00FF00', 60);
        game.shakeTimer = 10;
        game.shakeIntensity = 2;
        continue;
      }
      killPlayer();
      continue;
    }

    // Jump over barrel bonus
    if (!player.dead && player.vy < 0 &&
        Math.abs(player.x + PLAYER_W/2 - b.x - 8) < 20 &&
        player.y + PLAYER_H < b.y + 4 && player.y + PLAYER_H > b.y - 16) {
      if (!b.jumped) {
        b.jumped = true;
        player.score += 50;
        addFloatingText(b.x, b.y - 10, '+50', '#FFF', 30);
      }
    }
  }
}

function updateParticles() {
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    if (p.life <= 0) game.particles.splice(i, 1);
  }
}

function updateFloatingTexts() {
  for (let i = game.floatingTexts.length - 1; i >= 0; i--) {
    const ft = game.floatingTexts[i];
    ft.y -= 0.5;
    ft.life--;
    if (ft.life <= 0) game.floatingTexts.splice(i, 1);
  }
}

function render() {
  ctx.save();

  // Screen shake
  if (game.shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * game.shakeIntensity * 2;
    const sy = (Math.random() - 0.5) * game.shakeIntensity * 2;
    ctx.translate(sx, sy);
  }

  // Clear
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  switch (game.state) {
    case 'LANGUAGE_SELECT': renderLanguageSelect(); break;
    case 'TITLE': renderTitle(); break;
    case 'INSTRUCTIONS': renderInstructions(); break;
    case 'PLAYING': renderGame(); break;
    case 'LEVEL_CLEAR': renderLevelClear(); break;
    case 'GAME_OVER': renderGameOver(); break;
    case 'HIGH_SCORE_ENTRY': renderHighScoreEntry(); break;
  }

  ctx.restore();
}

function renderGame() {
  canvas.onclick = null;
  const lvl = getLevelData();
  if (!lvl) return;

  // Background
  lvl.drawBg();

  // Moving platforms
  for (const mp of game.movingPlatforms) drawPlatform(mp.x, mp.y, mp.w);

  // Platforms
  for (const p of lvl.platforms) drawPlatform(p.x, p.y, p.w);

  // Ladders
  for (const l of lvl.ladders) drawLadder(l.x, l.y, l.h);

  // Antenna spots
  for (const a of game.antennaStates) drawAntennaSpot(a.x, a.y, a.installed);

  // Backhaul
  if (lvl.backhaulSpot) drawBackhaulSpot(lvl.backhaulSpot.x, lvl.backhaulSpot.y);

  // Tokens
  for (const t of game.tokens) { if (!t.collected) drawToken(t.x, t.y, t.type, game.frameCount); }
  for (const t of game.bossTokens) { if (!t.collected) drawToken(t.x, t.y, t.type, game.frameCount); }

  // Ghosts
  for (const g of game.ghosts) drawSpectrumGhost(g.x, g.y, g.frame);

  // Barrels
  for (const b of game.barrels) {
    switch (b.type) {
      case 'COMPETITOR': drawCompetitorBarrel(b.x, b.y, b.rotation); break;
      case 'WEATHER': drawWeatherBarrel(b.x, b.y, b.rotation); break;
      case 'REGULATORY': drawRegulatoryBarrel(b.x, b.y, b.rotation); break;
      case 'NETFLIX': drawNetflixBarrel(b.x, b.y, b.rotation); break;
      case 'BEAD': drawBeadBarrel(b.x, b.y, b.rotation); break;
    }
  }

  // Villain
  if (lvl.villainPos && !game.bossDefeated) {
    // Boss hit flash
    if (game.bossHitFlash > 0) {
      ctx.globalAlpha = 0.5 + Math.sin(game.bossHitFlash * 2) * 0.5;
      game.bossHitFlash--;
    }
    drawVillain(lvl.villainPos.x, lvl.villainPos.y, game.villainFrame, lvl.isBoss);
    ctx.globalAlpha = 1;

    // Boss target reticle (pulsing when player has licensed spectrum)
    if (lvl.isBoss && player.hasLicensedSpectrum) {
      const bcx = lvl.villainPos.x + 32, bcy = lvl.villainPos.y + 24;
      const pulse = 0.15 + Math.sin(game.frameCount * 0.1) * 0.08;
      ctx.strokeStyle = `rgba(255,0,0,${pulse})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(bcx, bcy, 60, 0, Math.PI * 2);
      ctx.stroke();
      // Crosshair lines
      ctx.beginPath();
      ctx.moveTo(bcx - 8, bcy); ctx.lineTo(bcx + 8, bcy);
      ctx.moveTo(bcx, bcy - 8); ctx.lineTo(bcx, bcy + 8);
      ctx.stroke();
    }

    // Boss HP bar (only in boss level)
    if (lvl.isBoss && game.bossMaxHP > 0) {
      const bx = lvl.villainPos.x - 10;
      const by = lvl.villainPos.y - 20;
      const bw = 80;
      const hpPct = game.bossHP / game.bossMaxHP;
      ctx.fillStyle = '#333';
      ctx.fillRect(bx, by, bw, 8);
      ctx.fillStyle = hpPct > 0.5 ? '#CC0000' : (hpPct > 0.25 ? '#FF6600' : '#FF0000');
      ctx.fillRect(bx, by, bw * hpPct, 8);
      ctx.strokeStyle = '#FFF';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, bw, 8);
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(`BOSS: ${game.bossHP}/${game.bossMaxHP}`, bx + bw/2, by - 3);
    }
  } else if (game.bossDefeated && game.bossDefeatTimer > 0) {
    // Boss defeat explosion particles
    if (game.frameCount % 5 === 0 && lvl.villainPos) {
      addParticles(lvl.villainPos.x + 16 + (Math.random()-0.5)*40,
                   lvl.villainPos.y + 16 + (Math.random()-0.5)*40,
                   ['#FF0000','#FF6600','#FFFF00','#FF00FF'][Math.floor(Math.random()*4)], 3);
    }
  }

  // Projectiles — radio waves
  for (const proj of game.projectiles) {
    const dir = proj.vx > 0 ? 1 : -1;
    const age = Math.max(0, 90 - proj.life);
    // Expanding concentric arcs (radio wave propagation)
    for (let w = 0; w < 3; w++) {
      const offset = ((age * 3 + w * 8) % 24 + 24) % 24;
      const alpha = Math.max(0, 1 - offset / 24);
      const radius = Math.max(1, 4 + offset);
      ctx.strokeStyle = w === 0 ? `rgba(255,215,0,${alpha})` : (w === 1 ? `rgba(0,255,255,${alpha*0.8})` : `rgba(255,100,255,${alpha*0.6})`);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(proj.x, proj.y, radius, dir === 1 ? -Math.PI*0.4 : Math.PI*0.6, dir === 1 ? Math.PI*0.4 : Math.PI*1.4);
      ctx.stroke();
    }
    // Center dot (antenna emitter)
    ctx.fillStyle = '#FFF';
    ctx.fillRect(proj.x - 2, proj.y - 2, 4, 4);
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(proj.x - 1, proj.y - 1, 2, 2);
  }

  // Player
  if (!player.dead || game.frameCount % 6 < 3) {
    const pState = player.isInstalling ? 'install' : (player.onLadder ? 'climb' : (player.isJumping ? 'jump' : 'walk'));
    drawPlayer(player.x, player.y, player.animFrame, player.facing, pState);
  }

  // Frozen overlay
  if (player.frozen) {
    ctx.fillStyle = '#00FF0033';
    ctx.fillRect(player.x - 4, player.y - 4, PLAYER_W + 8, PLAYER_H + 8);
    ctx.fillStyle = '#00FF00';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('$$$', player.x + PLAYER_W/2, player.y - 6);
  }

  // Install progress bar
  if (player.isInstalling && player.installProgress > 0) {
    ctx.fillStyle = '#333';
    ctx.fillRect(player.x - 10, player.y - 10, 36, 6);
    ctx.fillStyle = '#00FF00';
    ctx.fillRect(player.x - 10, player.y - 10, 36 * player.installProgress, 6);
    ctx.strokeStyle = '#0F0';
    ctx.strokeRect(player.x - 10, player.y - 10, 36, 6);
  }

  // Particles
  for (const p of game.particles) {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Floating texts
  for (const ft of game.floatingTexts) {
    ctx.globalAlpha = ft.life / ft.maxLife;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;

  // Lightning flash
  if (game.lightningFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${game.lightningFlash / 15 * 0.3})`;
    ctx.fillRect(0, 0, W, H);
  }

  // HUD
  renderHUD();

  // Boss HUD
  if (getLevelData().isBoss) {
    if (game.bossDefeated) {
      ctx.fillStyle = '#00FF00';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BOSS DEFEATED! Install the backhaul! (E)', W/2, GAME_TOP + 25);
    } else {
      const msg = player.hasLicensedSpectrum
        ? S('spectrum_licensed') + '  [X] to SHOOT!'
        : S('spectrum_unlicensed');
      const col = player.hasLicensedSpectrum ? '#00FF00' : '#FF4444';
      ctx.fillStyle = col;
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      if (game.frameCount % 40 < 30) ctx.fillText(msg, W/2, GAME_TOP + 25);
    }
  }

  // Press E hint near antenna spots
  if (player.onGround) {
    for (const a of game.antennaStates) {
      if (!a.installed && Math.abs(player.x + PLAYER_W/2 - a.x - 6) < 25 && Math.abs(player.y + PLAYER_H - a.y) < 15) {
        ctx.fillStyle = '#FFAA00';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        if (game.frameCount % 40 < 30) ctx.fillText(S('press_e'), a.x + 6, a.y - 20);
      }
    }
  }
}

function renderHUD() {
  // Top bar
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, HUD_TOP);

  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`${S('score')}: ${String(player.score).padStart(6, '0')}`, 10, 28);

  ctx.textAlign = 'center';
  const lvlName = S(getLevelData()?.name_key || 'level1_name');
  ctx.fillStyle = '#4c6ef5';
  ctx.fillText(`${S('level')} ${game.currentLevel}: ${lvlName}`, W/2, 28);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#FFF';
  ctx.fillText(`${S('lives_label')}: `, W - 80, 28);
  // Life icons
  for (let i = 0; i < player.lives; i++) {
    ctx.fillStyle = '#FF6600';
    ctx.fillRect(W - 70 + i * 18, 16, 12, 8);
    ctx.fillStyle = '#FFCC99';
    ctx.fillRect(W - 70 + i * 18, 20, 12, 6);
  }

  // Bottom bar
  ctx.fillStyle = '#111';
  ctx.fillRect(0, H - HUD_BOT, W, HUD_BOT);
  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`HI: ${String(game.highScores[0]?.score || 0).padStart(6, '0')}`, 10, H - 6);
  ctx.textAlign = 'center';
  ctx.fillText(`[${lang}]`, W/2, H - 6);
  ctx.textAlign = 'right';
  ctx.fillText(S('copyright'), W - 10, H - 6);
}

function renderLevelClear() {
  renderGame();
  game.levelClearTimer++;

  // Scanline wipe
  const progress = Math.min(game.levelClearTimer / 60, 1);
  for (let i = 0; i < H; i += 4) {
    if (i / H < progress) {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, i, W, 2);
    }
  }

  ctx.fillStyle = '#00FF00';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(S('stage_clear'), W/2, 250);

  ctx.fillStyle = '#FFFF00';
  ctx.font = '18px monospace';
  ctx.fillText(`${S('score')}: ${player.score}`, W/2, 300);

  if (game.timeBonus > 0) {
    ctx.fillStyle = '#00FFFF';
    ctx.fillText(`${S('bonus')}: +${game.timeBonus}`, W/2, 330);
  }

  // Backhaul animation for boss
  if (game.currentLevel === 4 && game.levelClearTimer > 30) {
    // Satellite beam
    ctx.strokeStyle = `rgba(0,255,255,${Math.sin(game.levelClearTimer*0.1)*0.5+0.5})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(400, 120);
    ctx.lineTo(400, 0);
    ctx.stroke();

    ctx.fillStyle = '#00FFFF';
    ctx.font = 'bold 20px monospace';
    if (game.levelClearTimer > 60) ctx.fillText(S('latency_msg') + ' \u2713', W/2, 380);
    if (game.levelClearTimer > 90) ctx.fillText(S('network_up') + ' \uD83D\uDCE1', W/2, 420);
  }

  if (game.levelClearTimer > 120) {
    ctx.fillStyle = game.frameCount % 40 < 25 ? '#FFF' : '#000';
    ctx.font = '14px monospace';
    ctx.fillText('PRESS SPACE', W/2, 470);
  }
}

function renderGameOver() {
  game.gameOverTimer++;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Red tint
  const redAlpha = Math.min(game.gameOverTimer / 60, 0.3);
  ctx.fillStyle = `rgba(255,0,0,${redAlpha})`;
  ctx.fillRect(0, 0, W, H);

  // Letters fall in
  const text = S('game_over');
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  for (let i = 0; i < text.length; i++) {
    const delay = i * 8;
    const elapsed = game.gameOverTimer - delay;
    if (elapsed <= 0) continue;
    const yOff = elapsed < 20 ? -200 + elapsed * 10 : 0;
    ctx.fillStyle = '#FF0000';
    ctx.fillText(text[i], W/2 - (text.length * 14) + i * 28 + 14, 250 + yOff);
  }

  ctx.fillStyle = '#FFF';
  ctx.font = '20px monospace';
  ctx.fillText(`${S('score')}: ${player.score}`, W/2, 340);

  // Share text
  if (game.gameOverTimer > 100) {
    ctx.fillStyle = '#4c6ef5';
    ctx.font = '12px monospace';
    ctx.fillText('CLICK TO COPY SCORE / PRESS SPACE', W/2, 400);

    canvas.onclick = () => {
      const shareText = S('share').replace('%SCORE%', player.score);
      navigator.clipboard?.writeText(shareText);
      addFloatingText(W/2, 420, 'COPIED!', '#00FF00', 60);
    };
  }

  if (game.gameOverTimer > 60 && game.frameCount % 40 < 25) {
    ctx.fillStyle = '#FFFF00';
    ctx.font = '14px monospace';
    ctx.fillText('PRESS SPACE', W/2, 460);
  }

  // Floating texts
  for (const ft of game.floatingTexts) {
    ctx.globalAlpha = ft.life / ft.maxLife;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
  updateFloatingTexts();
}

function renderHighScoreEntry() {
  ctx.fillStyle = '#0a0a20';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(S('new_highscore'), W/2, 180);

  ctx.fillStyle = '#FFF';
  ctx.font = '20px monospace';
  ctx.fillText(`${S('score')}: ${player.score}`, W/2, 230);

  ctx.fillStyle = '#4c6ef5';
  ctx.font = '16px monospace';
  ctx.fillText(S('enter_initials'), W/2, 290);

  // Initials display
  const initDisp = game.initials.padEnd(3, '_');
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 48px monospace';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < game.initials.length ? '#FFD700' : '#444';
    ctx.fillText(initDisp[i], W/2 - 60 + i * 60, 370);
  }

  // Cursor blink
  if (game.initials.length < 3 && game.frameCount % 30 < 15) {
    const cx = W/2 - 60 + game.initials.length * 60;
    ctx.fillStyle = '#FFF';
    ctx.fillRect(cx - 12, 380, 24, 3);
  }

  if (game.initials.length > 0) {
    ctx.fillStyle = game.frameCount % 40 < 25 ? '#00FF00' : '#000';
    ctx.font = '14px monospace';
    ctx.fillText('PRESS ENTER TO CONFIRM', W/2, 440);
  }

  // High score table
  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  ctx.fillText('--- HIGH SCORES ---', W/2, 490);
  game.highScores.forEach((hs, i) => {
    ctx.fillStyle = '#CCC';
    ctx.fillText(`${i+1}. ${hs.name}  ${String(hs.score).padStart(6,'0')}`, W/2, 515 + i * 20);
  });
}

// ============================================================
// [15] MAIN GAME LOOP
// ============================================================
let lastTime = 0;
const TARGET_DT = 1000 / 60;
let accumulator = 0;

function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  accumulator += dt;
  // Cap accumulator to prevent spiral of death
  if (accumulator > TARGET_DT * 5) accumulator = TARGET_DT * 5;

  while (accumulator >= TARGET_DT) {
    try {
      update();
    } catch(e) {
      console.error('Update error:', e);
    }
    accumulator -= TARGET_DT;
  }

  try {
    render();
  } catch(e) {
    console.error('Render error:', e);
  }
  requestAnimationFrame(gameLoop);
}

// ============================================================
// [16] INIT
// ============================================================
loadHighScores();
requestAnimationFrame(gameLoop);

  </script>
